<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>本地测试UI - 四川四级面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* Aligned with langma_dashboard frontend (Landing / index.css @theme) */
    :root {
      --color-primary: #00342b;
      --color-primary-container: #004d40;
      --color-on-primary: #ffffff;
      --color-secondary: #506169;
      --color-secondary-container: #d1e2ec;
      --color-on-secondary-container: #55656d;
      --color-surface: #f9f9f9;
      --color-surface-container-lowest: #ffffff;
      --color-surface-container-low: #f3f3f3;
      --color-surface-container: #eeeeee;
      --color-on-surface: #1a1c1c;
      --color-on-surface-variant: #3f4945;
      --color-outline: #707975;
      --color-outline-variant: #bfc9c4;
      --border-subtle: rgba(191, 201, 196, 0.35);
      --border-hairline: rgba(191, 201, 196, 0.12);
      --accent: var(--color-primary);
      --accent-soft: rgba(0, 52, 43, 0.06);
      --text: var(--color-on-surface);
      --muted: var(--color-on-surface-variant);
      --line: var(--border-subtle);
      --panel: var(--color-surface-container-lowest);
      --danger: #8b1a10;
    }
    * { box-sizing: border-box; }
    ::selection {
      background: rgba(0, 52, 43, 0.2);
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      color: var(--color-on-surface);
      background: var(--color-surface);
      padding-bottom: 52px;
    }
    .font-headline {
      font-family: Manrope, Inter, "Microsoft YaHei", sans-serif;
    }
    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.15;
      background-image: radial-gradient(circle, var(--color-outline-variant) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .grain-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
    .app-shell {
      position: relative;
      z-index: 20;
    }
    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-hairline);
      background: rgba(243, 243, 243, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 50;
      flex-wrap: wrap;
    }
    .topbar-brand {
      font-family: Manrope, Inter, sans-serif;
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--color-primary);
      letter-spacing: -0.02em;
      margin-right: 4px;
    }
    .env-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-on-surface-variant);
      background: var(--color-surface-container-low);
      border: 1px solid var(--border-hairline);
      border-radius: 999px;
    }
    .topbar input, .topbar button, .topbar select {
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 13px;
      background: var(--color-surface-container-lowest);
      color: var(--color-on-surface);
    }
    .topbar button {
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }
    .topbar button:hover:not(:disabled) {
      opacity: 0.92;
    }
    .topbar button.primary {
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-color: var(--color-primary);
      font-weight: 700;
    }
    .topbar label { color: var(--color-on-surface-variant); }
    .status {
      margin-left: auto;
      color: var(--color-on-secondary-container);
      font-size: 12px;
      opacity: 0.85;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: calc(50vh - 48px) calc(50vh - 48px);
      gap: 16px;
      padding: 24px;
      max-width: 1920px;
      margin: 0 auto;
    }
    .panel {
      background: var(--color-surface-container-lowest);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      overflow: auto;
      min-height: 240px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
      transition: box-shadow 0.25s ease;
    }
    .panel:hover {
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    }
    .panel h3 {
      margin: 0;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-hairline);
      font-size: 15px;
      font-family: Manrope, Inter, sans-serif;
      font-weight: 700;
      color: var(--color-primary);
      letter-spacing: -0.02em;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-hairline);
    }
    .panel-head h3 {
      margin: 0;
      padding: 0;
      border: none;
      font-size: 15px;
    }
    .level1-source-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--color-primary);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
      line-height: 1;
      color: var(--color-on-primary);
      background: var(--color-primary);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }
    .link.level1-source-link,
    .link.level1-source-link:visited {
      color: var(--color-on-primary);
    }
    .level1-source-link:hover {
      opacity: 0.92;
      color: var(--color-on-primary);
      text-decoration: none;
    }
    .level1-source-link:active {
      transform: translateY(1px);
    }
    .inner { padding: 14px 16px; }

    .panel::-webkit-scrollbar,
    .chat-log::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .panel::-webkit-scrollbar-track,
    .chat-log::-webkit-scrollbar-track {
      background: transparent;
    }
    .panel::-webkit-scrollbar-thumb,
    .chat-log::-webkit-scrollbar-thumb {
      background: var(--color-outline-variant);
      border-radius: 10px;
    }
    .panel::-webkit-scrollbar-thumb:hover,
    .chat-log::-webkit-scrollbar-thumb:hover {
      background: var(--color-outline);
    }

    .item {
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 13px;
      background: var(--color-surface-container-lowest);
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .item.active, .item:hover {
      background: var(--accent-soft);
      border-color: rgba(0, 52, 43, 0.18);
    }

    .row {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: flex-start;
    }
    .row-title { flex: 1; line-height: 1.35; }
    .row-date {
      color: var(--muted);
      white-space: nowrap;
      font-size: 12px;
      margin-left: 8px;
    }

    .meta {
      font-size: 12px;
      color: var(--color-on-secondary-container);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-row input {
      flex: 1;
      min-width: 120px;
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 13px;
      background: var(--color-surface-container-lowest);
      color: var(--color-on-surface);
    }
    .search-row button {
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      background: var(--color-surface-container-lowest);
      color: var(--color-on-surface);
      cursor: pointer;
    }
    .search-row button.primary {
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-color: var(--color-primary);
      font-weight: 700;
    }

    pre {
      white-space: pre-wrap;
      font-size: 12px;
      color: var(--color-on-surface-variant);
      background: var(--color-surface-container-low);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 12px 14px;
      margin: 0;
    }

    .error { color: var(--danger); }
    .link {
      color: var(--color-primary-container);
      text-decoration: none;
      font-weight: 500;
    }
    .link:hover {
      text-decoration: underline;
      color: var(--color-primary);
    }
    .meta-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px;
      border: 1px solid var(--color-primary);
      border-radius: 12px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      color: var(--color-on-primary);
      background: var(--color-primary);
      text-decoration: none;
      transition: opacity 0.15s ease, transform 0.1s ease;
      vertical-align: middle;
    }
    .meta-link-btn:hover {
      opacity: 0.92;
      color: var(--color-on-primary);
      text-decoration: none;
    }
    .meta-link-btn:active {
      transform: translateY(1px);
    }

    .answer-box {
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      background: var(--accent-soft);
      padding: 12px 14px;
      margin-bottom: 10px;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.5;
      color: var(--color-on-surface);
    }

    .related-item {
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--color-surface-container-lowest);
    }
    .related-title {
      font-size: 13px;
      margin-bottom: 4px;
      line-height: 1.35;
    }
    .related-meta {
      font-size: 12px;
      color: var(--muted);
    }
    .score-query-item {
      margin-top: 12px;
      border-style: dashed;
    }
    .score-query-item .row-title {
      color: var(--accent);
      font-weight: 600;
    }

    .chat-panel-inner {
      display: flex;
      flex-direction: column;
      min-height: 220px;
      max-height: calc(50vh - 100px);
    }
    .chat-log {
      flex: 1;
      overflow: auto;
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 10px;
      background: var(--color-surface-container-low);
      margin-bottom: 8px;
    }
    .chat-msg {
      margin-bottom: 10px;
      max-width: 96%;
    }
    .chat-msg.user {
      margin-left: auto;
      text-align: right;
    }
    .chat-msg .bubble {
      display: inline-block;
      text-align: left;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-msg.user .bubble {
      background: var(--accent-soft);
      border: 1px solid rgba(0, 52, 43, 0.15);
    }
    .chat-msg.assistant .bubble {
      background: var(--color-surface-container-lowest);
      border: 1px solid var(--border-subtle);
    }
    .chat-msg-head {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }
    .chat-msg.user .chat-msg-head {
      justify-content: flex-end;
    }
    .chat-msg .role-label {
      font-size: 11px;
      color: var(--muted);
    }
    .chat-copy-btn {
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      color: var(--muted);
      line-height: 1.3;
    }
    .chat-copy-btn:hover {
      color: var(--color-primary);
      border-color: rgba(0, 52, 43, 0.25);
    }
    .panel-head button {
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      background: var(--color-surface-container-lowest);
      color: var(--color-on-surface);
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s ease;
    }
    .panel-head button.primary {
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-color: var(--color-primary);
    }
    .panel-head button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(26, 28, 28, 0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay[hidden] {
      display: none !important;
    }
    .modal-panel {
      background: var(--color-surface-container-lowest);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
      max-width: 440px;
      width: 100%;
      padding: 20px 22px;
    }
    .modal-title {
      margin: 0 0 12px;
      font-family: Manrope, Inter, sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--color-primary);
      letter-spacing: -0.02em;
    }
    .modal-body {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--color-on-surface);
      white-space: pre-line;
      max-height: 50vh;
      overflow: auto;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .modal-actions button.primary {
      border: 1px solid var(--color-primary);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      background: var(--color-primary);
      color: var(--color-on-primary);
      cursor: pointer;
    }
    .progress-wrap {
      margin: 0 0 12px;
    }
    .progress-text {
      margin: 0 0 6px;
      font-size: 12px;
      color: var(--color-on-secondary-container);
    }
    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--color-surface-container-low);
      border: 1px solid var(--border-subtle);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--color-primary-container), var(--color-primary));
      transition: width 0.2s ease;
    }
    .weekly-result-list {
      margin: 0;
      padding-left: 18px;
      max-height: 44vh;
      overflow: auto;
      color: var(--color-on-surface);
    }
    .weekly-result-list li {
      margin-bottom: 8px;
      line-height: 1.45;
      font-size: 13px;
    }
    .weekly-empty {
      font-size: 13px;
      color: var(--color-on-secondary-container);
      margin: 6px 0;
    }

    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 40;
      background: rgba(238, 238, 238, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-subtle);
      padding: 12px 24px;
      font-size: 12px;
      letter-spacing: 0.03em;
      color: var(--color-on-secondary-container);
    }
    .site-footer-inner {
      max-width: 1920px;
      margin: 0 auto;
      opacity: 0.88;
    }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="grain-overlay" aria-hidden="true"></div>

  <div class="app-shell">
  <div class="topbar">
    <span class="topbar-brand">朗玛峰 AI 工作台</span>
    <span class="env-tag">本地测试</span>
    <label for="provinceSelect"><strong>省份：</strong></label>
    <select id="provinceSelect"></select>
    <button id="refreshProvinceBtn" class="primary">刷新当前省份</button>
    <button id="preloadCrawlerBtn" type="button">爬虫加载</button>
    <button id="weeklyCrawlerInfoBtn" type="button">近一周爬虫信息</button>
    <span class="status" id="statusText">就绪</span>
  </div>

  <div class="grid">
    <section class="panel">
      <div class="panel-head">
        <h3 id="panel1Title">1级板块（一级）</h3>
        <a id="scoreQueryLink" class="link level1-source-link" href="#" target="_blank" rel="noopener noreferrer" hidden>成绩查询</a>
        <a id="level1SourceLink" class="link level1-source-link" href="#" target="_blank" rel="noopener noreferrer" hidden>查看原网址</a>
      </div>
      <div class="inner" id="level1Box"></div>
    </section>

    <section class="panel">
      <h3 id="panel2Title">2级板块（二级，右侧为发布日期）</h3>
      <div class="inner" id="level2Box"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h3 id="panel3Title">3级板块（内容爬取）</h3>
        <button type="button" id="summarizePolicyBtn" class="primary">AI总结</button>
      </div>
      <div class="inner">
        <div class="meta" id="level3Meta">请选择二级板块条目</div>
        <pre id="level3Content">暂无内容</pre>
      </div>
    </section>

    <section class="panel">
      <h3>4级板块（AI 对话）</h3>
      <div class="inner chat-panel-inner">
        <div class="meta" id="chatMeta">
          普通多轮对话，与左侧省份栏目无关。需在环境变量中配置 OPENAI_API_KEY（及可选 OPENAI_BASE_URL）或 DEEPSEEK_API_KEY。
        </div>
        <div class="chat-log" id="chatLog"></div>
        <div class="search-row">
          <input id="chatInput" placeholder="输入消息，回车或点发送…" />
          <button id="chatSendBtn" class="primary">发送</button>
          <button id="chatClearBtn" type="button">清空对话</button>
        </div>
      </div>
    </section>
  </div>
  </div>

  <div id="reportDialog" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="reportDialogTitle" hidden>
    <div class="modal-panel">
      <h4 id="reportDialogTitle" class="modal-title">更新报告</h4>
      <div id="reportDialogBody" class="modal-body"></div>
      <div class="modal-actions">
        <button type="button" id="reportDialogClose" class="primary">确定</button>
      </div>
    </div>
  </div>
  <div id="weeklyCrawlerDialog" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="weeklyCrawlerDialogTitle" hidden>
    <div class="modal-panel">
      <h4 id="weeklyCrawlerDialogTitle" class="modal-title">近一周爬虫信息（全省）</h4>
      <div class="progress-wrap">
        <div id="weeklyCrawlerProgressText" class="progress-text">准备查询…</div>
        <div class="progress-track"><div id="weeklyCrawlerProgressFill" class="progress-fill"></div></div>
      </div>
      <div id="weeklyCrawlerResultBody" class="modal-body"></div>
      <div class="modal-actions">
        <button type="button" id="weeklyCrawlerDialogClose" class="primary">关闭</button>
      </div>
    </div>
  </div>
  <div id="preloadCrawlerDialog" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="preloadCrawlerDialogTitle" hidden>
    <div class="modal-panel">
      <h4 id="preloadCrawlerDialogTitle" class="modal-title">爬虫加载（预热一二级）</h4>
      <div class="progress-wrap">
        <div id="preloadCrawlerProgressText" class="progress-text">准备预热…</div>
        <div class="progress-track"><div id="preloadCrawlerProgressFill" class="progress-fill"></div></div>
      </div>
      <div id="preloadCrawlerResultBody" class="modal-body"></div>
      <div class="modal-actions">
        <button type="button" id="preloadCrawlerDialogClose" class="primary">关闭</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="site-footer-inner">结果仅供老师参考，需人工判断</div>
  </footer>

  <script>
    const level1Box = document.getElementById("level1Box");
    const level2Box = document.getElementById("level2Box");
    const level3Meta = document.getElementById("level3Meta");
    const level3Content = document.getElementById("level3Content");
    const statusText = document.getElementById("statusText");
    const chatMeta = document.getElementById("chatMeta");
    const chatLog = document.getElementById("chatLog");
    const chatInput = document.getElementById("chatInput");
    let chatHistory = [];
    const provinceSelect = document.getElementById("provinceSelect");
    const panel1Title = document.getElementById("panel1Title");
    const panel2Title = document.getElementById("panel2Title");
    const panel3Title = document.getElementById("panel3Title");

    let selectedProvinceId = 1;
    let selectedProvinceName = "";
    let scoreQueryUrl = null;
    let uiLoadSeq = 0;
    let provinceUrlById = {};

    function apiUrl(path) {
      if (!path || path.startsWith("http://") || path.startsWith("https://")) return path;
      return window.location.origin + path;
    }

    async function jget(url, headers = {}) {
      const full = apiUrl(url);
      const cacheKey = full + "||" + JSON.stringify(headers || {});
      if (jgetCache.has(cacheKey)) return jgetCache.get(cacheKey);
      const r = await fetch(full, { headers });
      if (!r.ok) throw new Error("HTTP " + r.status + " " + full);
      const payload = await r.json();
      jgetCache.set(cacheKey, payload);
      return payload;
    }

    async function jpost(url, body, headers = {}) {
      const full = apiUrl(url);
      const r = await fetch(full, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...headers },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error("HTTP " + r.status + " " + full);
      return r.json();
    }

    async function jpostChat(body) {
      const paths = ["/api/test/chat", "/api/test/ai/chat"];
      let lastErr = null;
      for (const p of paths) {
        const full = apiUrl(p);
        const r = await fetch(full, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (r.ok) return r.json();
        lastErr = new Error("HTTP " + r.status + " " + full);
        if (r.status !== 404) throw lastErr;
      }
      throw lastErr;
    }

    function renderLevel1(rows) {
      level1Box.innerHTML = "";
      rows.forEach((row, idx) => {
        const d = document.createElement("div");
        d.className = "item";
        d.textContent = row.name;
        d.onclick = () => {
          [...level1Box.children].forEach(i => i.classList.remove("active"));
          d.classList.add("active");
          renderLevel2(row.items || []);

        level1Box.appendChild(d);

      if (pname) qs.set("display_name", pname);
      const payload = await jget(`/api/test/score-query?${qs.toString()}`);

      return u === null || u === undefined || u === "" ? null : u;

    function openPreloadCrawlerDialog() {
      document.getElementById("preloadCrawlerDialog").hidden = false;
      document.getElementById("preloadCrawlerDialogClose").focus();
    }

    function closePreloadCrawlerDialog() {
      document.getElementById("preloadCrawlerDialog").hidden = true;
    }

    function setPreloadCrawlerProgress(done, total) {
      const safeTotal = Math.max(1, total || 1);
      const pct = Math.min(100, Math.round((done / safeTotal) * 100));
      document.getElementById("preloadCrawlerProgressFill").style.width = pct + "%";
      document.getElementById("preloadCrawlerProgressText").textContent =
        `预热进度：${done}/${total}（${pct}%）`;
    }

    async function preloadAllProvincesL12(opts = {}) {
      const silent = Boolean(opts && opts.silent);
      if (!silent) openPreloadCrawlerDialog();
      const box = document.getElementById("preloadCrawlerResultBody");
      if (!silent) {
        box.innerHTML = '<div class="weekly-empty">正在并发预热（5）所有省份一二级数据…</div>';
      }
      try {
        const provinces = await jget("/api/provinces");
        const ids = (provinces || []).map(p => p.id);
        const total = ids.length;
        let done = 0;
        let ok = 0;
        let failed = 0;
        const MAX_CONCURRENCY = 5;
        setPreloadCrawlerProgress(0, total);
        const workers = Array.from({ length: Math.min(MAX_CONCURRENCY, total) }, async (_, workerIdx) => {
          for (let i = workerIdx; i < total; i += MAX_CONCURRENCY) {
            const pid = ids[i];
            try {
              await prefetchProvinceL12(pid);
              ok += 1;
            } catch (_) {
              failed += 1;
            }
            done += 1;
            if (!silent) setPreloadCrawlerProgress(done, total);
          }
        });
        await Promise.all(workers);
        if (!silent) {
          box.innerHTML = `<div class="weekly-empty">预热完成：成功 ${ok} 省，失败 ${failed} 省。之后切换省份会优先命中缓存，打开更快。</div>`;
        } else {
          setStatus(`后台预热完成：成功 ${ok} 省，失败 ${failed} 省`);
        }
      } catch (err) {
        const msg = err && err.message ? err.message : String(err);
        if (!silent) {
          box.innerHTML = `<div class="weekly-empty">预热失败：${escapeHtml(msg)}</div>`;
        } else {
          console.error("silent preload failed:", err);
        }
      }
    }

    function setWeeklyCrawlerProgress(done, total) {
      const safeTotal = Math.max(1, total || 1);
      const pct = Math.min(100, Math.round((done / safeTotal) * 100));
      document.getElementById("weeklyCrawlerProgressFill").style.width = pct + "%";
      document.getElementById("weeklyCrawlerProgressText").textContent =
        `查询进度：${done}/${total}（${pct}%）`;
    }

    function formatDateText(value) {
      if (!value) return "-";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleString("zh-CN", { hour12: false });
    }

    function parseDateLike(value) {
      const text = String(value || "").trim();
      if (!text) return null;
      const normalized = text.replace(/\./g, "-").replace(/\//g, "-");
      let m = normalized.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
      if (!m) m = text.match(/(\d{4})年(\d{1,2})月(\d{1,2})日?/);
      if (!m) return null;
      const y = Number(m[1]);
      const mo = Number(m[2]);
      const d = Number(m[3]);
      const dt = new Date(y, mo - 1, d, 0, 0, 0, 0);
      return Number.isNaN(dt.getTime()) ? null : dt;
    }

    function getCachedJsonByUrl(url) {
      const full = apiUrl(url);
      const key = full + "||{}";
      if (jgetCache.has(key)) return jgetCache.get(key);
      for (const [k, v] of jgetCache.entries()) {
        if (k.startsWith(full + "||")) return v;
      }
      return null;
    }

    function collectWeekItemsFromCachedPayload(pid, provinceName, payload, nowTs) {
      const rows = [];
      const weekAgoTs = nowTs - 7 * 24 * 3600 * 1000;
      const level1 = Array.isArray(payload && payload.level1) ? payload.level1 : [];
      level1.forEach(group => {
        const sectionName = String((group && group.name) || "");
        const items = Array.isArray(group && group.items) ? group.items : [];
        items.forEach(item => {
          const dt = parseDateLike(item && item.publish_date);
          if (!dt) return;
          const ts = dt.getTime();
          if (ts < weekAgoTs || ts > nowTs + 24 * 3600 * 1000) return;
          rows.push({
            province_id: pid,
            province: provinceName,
            section: sectionName || "-",
            title: String((item && item.title) || "(无标题)"),
            url: String((item && item.url) || ""),
            publish_date: String((item && item.publish_date) || ""),
            sort_ts: ts,
          });
        });
      });
      return rows;
    }

    function renderWeeklyCrawlerResult(allItems) {
      const box = document.getElementById("weeklyCrawlerResultBody");
      if (!allItems.length) {
        box.innerHTML = '<div class="weekly-empty">缓存中近一周暂无带日期的二级板块记录。</div>';
        return;
      }
      const lines = allItems.map(item => {
        const when = formatDateText(item.publish_date);
        const province = escapeHtml(item.province || "-");
        const section = escapeHtml(item.section || "-");
        const title = escapeHtml(item.title || "(无标题)");
        const url = escapeHtml(item.url || "");
        return `<li>[${when}] ${province} / ${section}<br>${title}${url ? ` <a class="link" href="${url}" target="_blank" rel="noopener noreferrer">查看</a>` : ""}</li>`;
      });
      box.innerHTML = `<ol class="weekly-result-list">${lines.join("")}</ol>`;
    }

    async function loadWeeklyCrawlerInfo() {
      openWeeklyCrawlerDialog();
      const resultBody = document.getElementById("weeklyCrawlerResultBody");
      resultBody.innerHTML = '<div class="weekly-empty">正在扫描缓存中的二级板块日期…</div>';
      try {
        const provinces = await jget("/api/provinces");
        const total = provinces.length;
        let done = 0;
        const allItems = [];
        const nowTs = Date.now();
        setWeeklyCrawlerProgress(0, total);
        for (const p of provinces) {
          const pid = p.id;
          const pname = p.name || "";
          try {
            // 特殊站点：读取缓存的 /api/test/*/levels
            const endpoint = resolveSpecialLevelsEndpoint(pid);
            if (endpoint) {
              const payload = getCachedJsonByUrl(endpoint);
              if (payload) {
                allItems.push(...collectWeekItemsFromCachedPayload(pid, pname, payload, nowTs));
              }
            } else {
              // 普通站点：读取缓存 sections + contents 列表中的 publish_date
              const sections = getCachedJsonByUrl(`/api/provinces/${pid}/sections`);
              const secRows = Array.isArray(sections) ? sections : [];
              for (const sec of secRows) {
                const contentPayload = getCachedJsonByUrl(`/api/sections/${sec.id}/contents?page=1&page_size=50`);
                const rows = Array.isArray(contentPayload && contentPayload.data)
                  ? contentPayload.data
                  : [];
                rows.forEach(item => {
                  const dt = parseDateLike(item && item.publish_date);
                  if (!dt) return;
                  const ts = dt.getTime();
                  if (ts < nowTs - 7 * 24 * 3600 * 1000 || ts > nowTs + 24 * 3600 * 1000) return;
                  allItems.push({
                    province_id: pid,
                    province: pname,
                    section: String((sec && sec.name) || "-"),
                    title: String((item && item.title) || "(无标题)"),
                    url: String((item && item.url) || ""),
                    publish_date: String((item && item.publish_date) || ""),
                    sort_ts: ts,
                  });
                });
              }
            }
          } catch (_) {
            // 缓存缺失或结构不符时忽略该省
          }
          done += 1;
          setWeeklyCrawlerProgress(done, total);
        }
        allItems.sort((a, b) => b.sort_ts - a.sort_ts);
        renderWeeklyCrawlerResult(allItems);
      } catch (err) {
        const msg = err && err.message ? err.message : String(err);
        resultBody.innerHTML = `<div class="weekly-empty">查询失败：${escapeHtml(msg)}</div>`;
      }
    }

    async function copyChatPlainText(plain, btn) {
      const t = String(plain ?? "");
      if (!t) return;
      try {
        await navigator.clipboard.writeText(t);
        const prev = btn.textContent;
        btn.textContent = "已复制";
        setTimeout(() => {
          btn.textContent = prev;
        }, 1600);
      } catch (e) {
        alert("复制失败，请手动选中气泡内文字复制。");
      }
    }

    function appendChatBubble(role, text) {
      const wrap = document.createElement("div");
      wrap.className = "chat-msg " + (role === "user" ? "user" : "assistant");
      const head = document.createElement("div");
      head.className = "chat-msg-head";
      const label = document.createElement("span");
      label.className = "role-label";
      label.textContent = role === "user" ? "你" : "助手";
      const copyBtn = document.createElement("button");
      copyBtn.type = "button";
      copyBtn.className = "chat-copy-btn";
      copyBtn.textContent = "复制";
      copyBtn.addEventListener("click", () => copyChatPlainText(text, copyBtn));
      head.appendChild(label);
      head.appendChild(copyBtn);
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      wrap.appendChild(head);
      wrap.appendChild(bubble);
      chatLog.appendChild(wrap);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function clearChat() {
      chatHistory = [];
      chatLog.innerHTML = "";
      chatMeta.textContent =
        "对话已清空。需在环境变量中配置 OPENAI_API_KEY 或 DEEPSEEK_API_KEY。";
    }

    async function sendChatMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      chatInput.value = "";
      appendChatBubble("user", text);
      const toSend = chatHistory.concat([{ role: "user", content: text }]);
      setStatus("AI 回复中…");
      chatMeta.textContent = "正在请求模型…";
      try {
        const payload = await jpostChat({ messages: toSend });
        if (!payload.ok) {
          chatLog.removeChild(chatLog.lastChild);
          chatMeta.textContent = payload.error || "调用失败";
          alert(payload.error || "调用失败");
          return;
        }
        chatHistory.push({ role: "user", content: text });
        chatHistory.push({ role: "assistant", content: payload.reply });
        appendChatBubble("assistant", payload.reply);
        const rounds = Math.floor(chatHistory.length / 2);
        chatMeta.textContent = `已进行 ${rounds} 轮对话（与省份选择无关）`;
      } catch (err) {
        if (chatLog.lastChild) chatLog.removeChild(chatLog.lastChild);
        chatMeta.textContent = "请求失败";
        const msg = err.message || String(err);
        alert(
          msg +
            (msg.indexOf("404") !== -1
              ? "\n\n若持续 404：请在本机停止旧 uvicorn 后重新执行：python -m uvicorn app.main:app --host 127.0.0.1 --port 8001"
              : "")
        );
      }
      setStatus("就绪");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function extractLevel3Title() {
      const raw = (level3Meta.textContent || "").replace(/\s+/g, " ").trim();
      if (raw.startsWith("标题：")) {
        let t = raw.slice(3).trim();
        const idx = t.indexOf("[查看原网址]");
        if (idx !== -1) t = t.slice(0, idx).trim();
        return t;
      }
      return "";
    }

    function formatPolicySummaryHtml(text) {
      return escapeHtml(String(text)).replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    }

    function appendPolicySummaryAssistant(replyText) {
      const plain = String(replyText ?? "");
      const wrap = document.createElement("div");
      wrap.className = "chat-msg assistant";
      const head = document.createElement("div");
      head.className = "chat-msg-head";
      const label = document.createElement("span");
      label.className = "role-label";
      label.textContent = "助手（政策整理）";
      const copyBtn = document.createElement("button");
      copyBtn.type = "button";
      copyBtn.className = "chat-copy-btn";
      copyBtn.textContent = "复制";
      copyBtn.addEventListener("click", () => copyChatPlainText(plain, copyBtn));
      head.appendChild(label);
      head.appendChild(copyBtn);
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = formatPolicySummaryHtml(replyText);
      wrap.appendChild(head);
      wrap.appendChild(bubble);
      chatLog.appendChild(wrap);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    async function summarizeLevel3Policy() {
      const btn = document.getElementById("summarizePolicyBtn");
      const text = (level3Content.textContent || "").trim();
      if (
        !text ||
        text === "暂无内容" ||
        text === "空内容" ||
        text.startsWith("抓取失败")
      ) {
        alert("请先在第三板块加载有效正文后再试。");
        return;
      }
      const title = extractLevel3Title();
      if (btn) btn.disabled = true;
      setStatus("政策整理中…");
      chatMeta.textContent = "正在根据第三板块正文生成政策整理…";
      appendChatBubble("user", "【政策整理】已根据第三板块正文发起总结");
      const loadingWrap = document.createElement("div");
      loadingWrap.className = "chat-msg assistant";
      loadingWrap.innerHTML =
        '<div class="role-label">助手（政策整理）</div><div class="bubble">整理中…</div>';
      chatLog.appendChild(loadingWrap);
      chatLog.scrollTop = chatLog.scrollHeight;
      try {
        const payload = await jpost("/api/test/summarize-policy", {
          content: text,
          title: title || undefined,
        });
        chatLog.removeChild(loadingWrap);
        if (!payload.ok) {
          if (chatLog.lastChild) chatLog.removeChild(chatLog.lastChild);
          chatMeta.textContent = payload.error || "政策整理失败";
          alert(payload.error || "调用失败");
          return;
        }
        appendPolicySummaryAssistant(payload.reply);
        chatMeta.textContent =
          "政策整理已显示在下方；多轮对话历史未写入正文全文，可继续普通对话。";
      } catch (err) {
        if (loadingWrap.parentNode) chatLog.removeChild(loadingWrap);
        if (chatLog.lastChild) chatLog.removeChild(chatLog.lastChild);
        chatMeta.textContent = "政策整理请求失败";
        const msg = err.message || String(err);
        alert(
          msg +
            (msg.indexOf("404") !== -1
              ? "\n\n请确认服务已重启并包含接口 /api/test/summarize-policy"
              : "")
        );
      } finally {
        if (btn) btn.disabled = false;
        setStatus("就绪");
      }
    }

    provinceSelect.onchange = async () => {
      selectedProvinceId = Number(provinceSelect.value || "1");
      const opt = provinceSelect.options[provinceSelect.selectedIndex];
      selectedProvinceName = opt ? opt.textContent : "";
      await loadLevelData();
      chatMeta.textContent =
        `当前省份: ${selectedProvinceName}（id=${selectedProvinceId}）· 右侧 AI 对话与省份无关`;
    };

    document.getElementById("refreshProvinceBtn").onclick = refreshProvince;
    document.getElementById("preloadCrawlerBtn").onclick = preloadAllProvincesL12;
    document.getElementById("weeklyCrawlerInfoBtn").onclick = loadWeeklyCrawlerInfo;

    (function initReportDialogUi() {
      const overlay = document.getElementById("reportDialog");
      const panel = overlay.querySelector(".modal-panel");
      document.getElementById("reportDialogClose").onclick = closeReportDialog;
      overlay.addEventListener("click", e => {
        if (e.target === overlay) closeReportDialog();
      });
      panel.addEventListener("click", e => e.stopPropagation());
      document.addEventListener("keydown", e => {
        if (e.key === "Escape" && !overlay.hidden) closeReportDialog();
      });
    })();
    (function initWeeklyCrawlerDialogUi() {
      const overlay = document.getElementById("weeklyCrawlerDialog");
      const panel = overlay.querySelector(".modal-panel");
      document.getElementById("weeklyCrawlerDialogClose").onclick = closeWeeklyCrawlerDialog;
      overlay.addEventListener("click", e => {
        if (e.target === overlay) closeWeeklyCrawlerDialog();
      });
      panel.addEventListener("click", e => e.stopPropagation());
      document.addEventListener("keydown", e => {
        if (e.key === "Escape" && !overlay.hidden) closeWeeklyCrawlerDialog();
      });
    })();
    (function initPreloadCrawlerDialogUi() {
      const overlay = document.getElementById("preloadCrawlerDialog");
      const panel = overlay.querySelector(".modal-panel");
      document.getElementById("preloadCrawlerDialogClose").onclick = closePreloadCrawlerDialog;
      overlay.addEventListener("click", e => {
        if (e.target === overlay) closePreloadCrawlerDialog();
      });
      panel.addEventListener("click", e => e.stopPropagation());
      document.addEventListener("keydown", e => {
        if (e.key === "Escape" && !overlay.hidden) closePreloadCrawlerDialog();
      });
    })();
    document.getElementById("chatSendBtn").onclick = sendChatMessage;
    document.getElementById("chatClearBtn").onclick = clearChat;
    document.getElementById("summarizePolicyBtn").onclick = summarizeLevel3Policy;
    chatInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendChatMessage();
      }
    });

    async function init() {
      try {
        await loadProvinces();
        await loadLevelData();
        chatMeta.textContent =
          `当前省份: ${selectedProvinceName}（id=${selectedProvinceId}）· 右侧 AI 对话与省份无关`;
        // 页面进入后静默预热，不打断用户当前操作
        preloadAllProvincesL12({ silent: true });
      } catch (err) {
        setStatus("加载失败");
        console.error(err);
      }
    }

    init();
  </script>
</body>
